<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profissionais</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <h1>Profissionais</h1>
    <nav>
        <a href="/">Home</a> |
        <a href="/vagas">Vagas</a> |
        <a href="/admin/empresas">Empresas</a> |
        <a href="/admin/profissionais">Peritos</a> |
        <a href="/logout">Logout</a>
    </nav>
</header>
<main>
    <a th:href="@{/admin/profissionais/novo}">Novo profissional</a>
    <table>
        <thead>
        <tr>
            <th>Nome: </th>
            <th>Email:</th>
            <th>Telefone:</th>
            <th>Cargo:</th>
            <th>Ações</th>
            
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${profissionais}">
            <td th:text="${p.nome}"></td>
            <td th:text="${p.email}"></td>
            <td th:text="${p.telefone}"></td>
            <td th:text="${p.cargo}"></td>
            <td>
                <a th:href="@{'/admin/profissionais/' + ${p.id} + '/editar'}">Editar</a>
                |
                <a th:href="@{'/admin/profissionais/' + ${p.id} + '/apagar'}" onclick="return confirm('Apagar?')">Apagar</a>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
