<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Estágios</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <div>
        <h1>Sistema para Candidatura e Seleção de Vagas de Estágio</h1>
        <h1>lucas-gab46</h1>
        <p>Projeto T5 a T8.</p>
    </div>
    <nav>
        <a th:if="${session.empresaId == null and session.admin != true}" th:href="@{/login}">Login Empresarial</a>
        <a th:if="${session.empresaId != null}" th:href="@{/empresa/vagas}">Painel da Empresa</a>
        <a th:if="${session.admin == true}" th:href="@{/admin/empresas}">Painel da Administração</a>
        <a th:if="${session.empresaId != null or session.admin == true}" th:href="@{/logout}">Sair</a>
    </nav>
</header>
    
<main>
    <section class="card">
        <h2>Vagas públicas</h2>
        <a href="/vagas">Visualizar vagas</a>
    </section>

   
</main>
</body>
</html>
