<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{pagina.avaliacaoCandidatura}">Avaliar Candidatura</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <nav>
        <a th:if="${session.empresaId == null and (session.admin == null or session.admin == false) and session.candidatoId == null}" th:href="@{/login}">[[#{nav.login}]]</a>
        <a th:if="${session.candidatoId == null}" th:href="@{/login(role='candidate')}">[[#{candidato.login}]]</a>
        <a th:if="${session.candidatoId == null}" th:href="@{/candidato/register}">[[#{candidato.register}]]</a>
        <a th:if="${session.empresaId != null}" th:href="@{/empresa/vagas}">[[#{empresa.painel}]]</a>
        <a th:if="${session.admin == true}" th:href="@{/admin/empresas}">[[#{admin.painel}]]</a>
        <a th:if="${session.empresaId != null or (session.admin != null and session.admin == true) or session.candidatoId != null}" th:href="@{/logout}">[[#{btn.sair}]]</a>
    </nav>
</header>
<main>
    <section class="card">
        <h1 th:text="#{pagina.avaliacaoCandidatura}">Avaliar Candidatura</h1>
        <p><strong th:text="#{vaga.nome}">Vaga:</strong> <span th:text="${candidatura.vaga.titulo}"></span></p>
        <p><strong th:text="#{candidato.nome}">Candidato:</strong> <span th:text="${candidatura.candidato.nome}"></span></p>
        <p><strong th:text="#{candidato.email}">E-mail:</strong> <span th:text="${candidatura.candidato.email}"></span></p>
        <p><strong th:text="#{candidato.curriculo}">Currículo:</strong> <span th:text="${candidatura.curriculo}">Currículo</span></p>

        <form th:action="@{/empresa/candidaturas/{id}/avaliar(id=${candidatura.id})}" th:object="${candidatura}" method="post">
            <label for="status" th:text="#{candidatura.status}">Status</label>
            <select id="status" th:field="*{status}" required>
                <option th:each="statusOption : ${statusOptions}"
                        th:value="${statusOption}"
                        th:text="${statusOption}"></option>
            </select>
            <div th:errors="*{status}" class="error-message"></div>

            <label for="dataEntrevista" th:text="#{candidatura.dataEntrevista}">Data da Entrevista</label>
            <input type="date" id="dataEntrevista" th:field="*{dataEntrevista}">
            <div th:errors="*{dataEntrevista}" class="error-message"></div>

            <label for="horarioEntrevista" th:text="#{btn.horario}">Horário da Entrevista</label>
            <input type="time" id="horarioEntrevista" th:field="*{horarioEntrevista}">
            <div th:errors="*{horarioEntrevista}" class="error-message"></div>

            <label for="linkVideoconferencia" th:text="#{candidatura.linkVideoconferencia}">Link Google Meet</label>
            <input type="url" id="linkVideoconferencia" th:field="*{linkVideoconferencia}">
            <div th:errors="*{linkVideoconferencia}" class="error-message"></div>

            <label for="justificativaRecusa" th:text="#{candidatura.justificativa}">Carta Recusão</label>
            <textarea id="justificativaRecusa" th:field="*{justificativaRecusa}" rows="4"></textarea>
            <div th:errors="*{justificativaRecusa}" class="error-message"></div>

            <button type="submit" th:text="#{btn.salvar}">Salvar</button>
        </form>
        <div th:if="${#fields.hasErrors('*')}">
            <p class="error-message" th:text="#{erro.generico}">Erro no formulário.</p>
        </div>
    </section>
</main>
</body>
</html>
