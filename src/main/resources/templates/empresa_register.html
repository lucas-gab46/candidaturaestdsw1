<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{empresa.register}">Cadastro de Empresa</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <nav>
        <a th:if="${session.empresaId == null and (session.admin == null or session.admin == false) and session.candidatoId == null}" th:href="@{/login}">[[#{nav.login}]]</a>
        <a th:if="${session.candidatoId == null}" th:href="@{/login(role='candidate')}">[[#{candidato.login}]]</a>
        <a th:if="${session.candidatoId == null}" th:href="@{/candidato/register}">[[#{candidato.register}]]</a>
        <a th:if="${session.empresaId != null}" th:href="@{/empresa/vagas}">[[#{empresa.painel}]]</a>
        <a th:if="${session.admin == true}" th:href="@{/admin/empresas}">[[#{admin.painel}]]</a>
        <a th:if="${session.empresaId != null or (session.admin != null and session.admin == true) or session.candidatoId != null}" th:href="@{/logout}">[[#{nav.sair}]]</a>
    </nav>
</header>
<main>
    <section class="card">
        <h1 th:text="#{empresa.register}">Cadastro de Empresa</h1>
        <form th:action="@{/empresa/register}" th:object="${empresa}" method="post" autocomplete="on">
            <div th:if="${#fields.hasErrors('*')}">
                <p class="error-message" th:text="#{erro.generico}">Existem erros no formulário.</p>
            </div>

            <label for="email" th:text="#{empresa.email}">E-mail</label>
            <input type="email" id="email" th:field="*{email}" placeholder="contato@empresa.com" required>
            <div th:errors="*{email}" class="error-message"></div>

            <label for="senha" th:text="#{empresa.senha}">Senha</label>
            <input type="password" id="senha" th:field="*{senha}" minlength="6" required>
            <div th:errors="*{senha}" class="error-message"></div>

            <label for="cnpj" th:text="#{empresa.cnpj}">CNPJ</label>
            <input type="text" id="cnpj" th:field="*{cnpj}" placeholder="00.000.000/0000-00" pattern="\d{2}\.\d{3}\.\d{3}/\d{4}-\d{2}" required>
            <div th:errors="*{cnpj}" class="error-message"></div>

            <label for="nome" th:text="#{empresa.nome}">Nome</label>
            <input type="text" id="nome" th:field="*{nome}" required>
            <div th:errors="*{nome}" class="error-message"></div>

            <label for="telefone" th:text="#{empresa.telefone}">Telefone</label>
            <input type="tel" id="telefone" th:field="*{telefone}" placeholder="(00)00000-0000" pattern="\d{10,11}" required>
            <div th:errors="*{telefone}" class="error-message"></div>

            <label for="areaAtuacao" th:text="#{empresa.areaAtuacao}">Área de atuação</label>
            <input type="text" id="areaAtuacao" th:field="*{areaAtuacao}" required>
            <div th:errors="*{areaAtuacao}" class="error-message"></div>

            <label for="cidade" th:text="#{empresa.cidade}">Cidade</label>
            <input type="text" id="cidade" th:field="*{cidade}" required>
            <div th:errors="*{cidade}" class="error-message"></div>

            <label for="descricao" th:text="#{empresa.descricao}">Descrição</label>
            <textarea id="descricao" th:field="*{descricao}" rows="4" required></textarea>
            <div th:errors="*{descricao}" class="error-message"></div>

            <button type="submit" th:text="#{btn.cadastrar}">Cadastrar</button>
        </form>
    </section>
</main>
</body>
</html>
