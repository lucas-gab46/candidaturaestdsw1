<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Candidatar-se a Vaga</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <nav>
        <a th:if="${session.empresaId == null and session.admin != true and session.candidatoId == null}" th:href="@{/login}">Login Empresarial</a>
        <a th:if="${session.candidatoId == null}" th:href="@{/candidato/login}">Login Candidato</a>
        <a th:if="${session.candidatoId == null}" th:href="@{/candidato/register}">Cadastro Candidato</a>
        <a th:if="${session.empresaId != null}" th:href="@{/empresa/vagas}">Painel da Empresa</a>
        <a th:if="${session.admin == true}" th:href="@{/admin/empresas}">Painel da Administração</a>
        <a th:if="${session.empresaId != null or session.admin == true or session.candidatoId != null}" th:href="@{/logout}">Sair</a>
    </nav>
</header>
<main>
    <section class="card">
        <h1 th:text="${vaga.titulo}">Candidatar-se</h1>
        <p><strong>Empresa:</strong> <span th:text="${vaga.empresa.nome}"></span></p>
        <p><strong>Descrição:</strong> <span th:text="${vaga.descricao}"></span></p>
        <p><strong>Requisitos:</strong> <span th:text="${vaga.requisitos}"></span></p>
        <p><strong>Bolsa:</strong> R$ <span th:text="${vaga.valorBolsa}"></span></p>

        <form th:action="@{/candidato/vagas/{id}/candidatar(id=${vaga.id})}" th:object="${candidatura}" method="post">
            <label for="mensagemApresentacao">Mensagem de apresentação</label>
            <div></div>
            <textarea id="mensagemApresentacao" th:field="*{mensagemApresentacao}" rows="5" required></textarea>
            <div th:errors="*{mensagemApresentacao}" class="error-message"></div>

            <label for="curriculo">Currículo</label>
            <textarea id="curriculo" th:field="*{curriculo}" rows="5"></textarea>
            <div th:errors="*{curriculo}" class="error-message"></div>

            <button type="submit">Enviar candidatura</button>
        </form>
        <div th:if="${#fields.hasErrors('*')}">
            <p class="error-message">Erro no formulário.</p>
        </div>
    </section>
</main>
</body>
</html>
