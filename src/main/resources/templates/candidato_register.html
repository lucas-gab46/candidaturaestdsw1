<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{candidato.register}">Cadastro de Candidato</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <nav>
        <a th:if="${session.empresaId == null and (session.admin == null or session.admin == false) and session.candidatoId == null}" th:href="@{/login}">[[#{nav.login}]]</a>
        <a th:if="${session.candidatoId == null}" th:href="@{/login(role='candidate')}">[[#{candidato.login}]]</a>
        <a th:if="${session.empresaId != null}" th:href="@{/empresa/vagas}">[[#{empresa.painel}]]</a>
        <a th:if="${session.admin == true}" th:href="@{/admin/empresas}">[[#{admin.painel}]]</a>
        <a th:if="${session.empresaId != null or (session.admin != null and session.admin == true) or session.candidatoId != null}" th:href="@{/logout}">[[#{nav.sair}]]</a>
    </nav>
</header>
<main>
    <section class="card">
        <h1 th:text="#{candidato.register}">Cadastro de Candidato</h1>
        <form th:action="@{/candidato/register}" th:object="${candidato}" method="post" enctype="multipart/form-data" autocomplete="on">
            <div th:if="${#fields.hasErrors('*')}">
                <p class="error-message" th:text="#{erro.generico}">Erro no Formulário.</p>
            </div>

            <label for="email" th:text="#{candidato.email}">E-mail</label>
            <input type="email" id="email" th:field="*{email}" placeholder="seu@email.com" required>
            <div th:errors="*{email}" class="error-message"></div>

            <label for="senha" th:text="#{candidato.senha}">Senha</label>
            <input type="password" id="senha" th:field="*{senha}" minlength="6" required>
            <div th:errors="*{senha}" class="error-message"></div>

            <label for="cpf" th:text="#{candidato.cpf}">CPF</label>
            <input type="text" id="cpf" th:field="*{cpf}" placeholder="000.000.000-00" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" required>
            <div th:errors="*{cpf}" class="error-message"></div>

            <label for="nome" th:text="#{candidato.nome}">Nome</label>
            <input type="text" id="nome" th:field="*{nome}" required>
            <div th:errors="*{nome}" class="error-message"></div>

            <label for="telefone" th:text="#{candidato.telefone}">Telefone</label>
            <input type="tel" id="telefone" th:field="*{telefone}" placeholder="(00)00000-0000" pattern="\d{10,11}" required>
            <div th:errors="*{telefone}" class="error-message"></div>

            <label for="sexo" th:text="#{candidato.sexo}">Sexo</label>
            <select id="sexo" th:field="*{sexo}" required>
                <option th:each="sexo : ${sexos}" th:value="${sexo}" th:text="${sexo}"></option>
            </select>
            <div th:errors="*{sexo}" class="error-message"></div>

            <label for="dataNascimento" th:text="#{candidato.dataNascimento}">Data de Nascimento</label>
            <input type="date" id="dataNascimento" th:field="*{dataNascimento}" required>
            <div th:errors="*{dataNascimento}" class="error-message"></div>

            <label for="curso" th:text="#{candidato.curso}">Curso</label>
            <input type="text" id="curso" th:field="*{curso}" required>
            <div th:errors="*{curso}" class="error-message"></div>

            <label for="periodo" th:text="#{candidato.periodo}">Período</label>
            <input type="text" id="periodo" th:field="*{periodo}" required>
            <div th:errors="*{periodo}" class="error-message"></div>

            <label for="cidade" th:text="#{candidato.cidade}">Cidade</label>
            <input type="text" id="cidade" th:field="*{cidade}" required>
            <div th:errors="*{cidade}" class="error-message"></div>

            <label for="curriculo" th:text="#{candidato.curriculo}">Currículo</label>
            <textarea id="curriculo" th:field="*{curriculo}" rows="5"></textarea>
            <div th:errors="*{curriculo}" class="error-message"></div>

            <label for="resumeFile" th:text="#{form.uploadCurriculo}">Upload de Currículo</label>
            <input type="file" id="resumeFile" name="resumeFile" accept=".txt,.pdf,.doc,.docx">
            <button type="submit" th:text="#{btn.cadastrar}">Cadastrar</button>
        </form>
    </section>
</main>
</body>
</html>
