<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Candidato</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <nav>
        <a th:if="${session.empresaId == null and session.admin != true and session.candidatoId == null}" th:href="@{/login}">Login Empresarial</a>
        <a th:if="${session.candidatoId == null}" th:href="@{/candidato/login}">Login</a>
        <a th:if="${session.candidatoId == null}" th:href="@{/candidato/register}">Cadastro</a>
        <a th:if="${session.empresaId != null}" th:href="@{/empresa/vagas}">Painel da Empresa</a>
        <a th:if="${session.admin == true}" th:href="@{/admin/empresas}">Painel da Administração</a>
        <a th:if="${session.empresaId != null or session.admin == true or session.candidatoId != null}" th:href="@{/logout}">Sair</a>
    </nav>
</header>
<main>
    <section class="card">
        <h1>Cadastro de Candidato</h1>
        <form th:action="@{/candidato/register}" th:object="${candidato}" method="post" autocomplete="on">
            <div th:if="${#fields.hasErrors('*')}">
                <p class="error-message">Erro no Formulário.</p>
            </div>
             <div>
                
            <label for="email">E-mail</label>
            <input type="email" id="email" th:field="*{email}" required>
            <div th:errors="*{email}" class="error-message"></div>
            </div>

                        <div>
            <label for="senha">Senha</label>
            <input type="password" id="senha" th:field="*{senha}" required>
            <div th:errors="*{senha}" class="error-message"></div>

            </div>

            <div>

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" th:field="*{cpf}" placeholder="000.000.000-00" required>
            <div th:errors="*{cpf}" class="error-message"></div> 
            </div>

            <div>

            <label for="nome">Nome</label>
            <input type="text" id="nome" th:field="*{nome}" required>
            <div th:errors="*{nome}" class="error-message"></div>
                
            </div>

            <div>
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" th:field="*{telefone}" required>
            <div th:errors="*{telefone}" class="error-message"></div>
            <div>

            </div>
                         <div>

            <label for="sexo">Sexo</label>
            <select id="sexo" th:field="*{sexo}" required>
                <option th:each="sexo : ${sexos}" th:value="${sexo}" th:text="${sexo}"></option>
            </select>
            <div th:errors="*{sexo}" class="error-message"></div>
                
            </div>

            <label for="dataNascimento">Data de Nascimento</label>
            <input type="date" id="dataNascimento" th:field="*{dataNascimento}" required>
            <div th:errors="*{dataNascimento}" class="error-message"></div>
             
                        <div>

            <label for="curso">Curso</label>
            <input type="text" id="curso" th:field="*{curso}" required>
            <div th:errors="*{curso}" class="error-message"></div>
            <div>

            </div>

            <label for="periodo">Período</label>
            <input type="text" id="periodo" th:field="*{periodo}" required>
            <div th:errors="*{periodo}" class="error-message"></div>

            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" th:field="*{cidade}" required>
            <div th:errors="*{cidade}" class="error-message"></div>

            <label for="curriculo">Currículo</label>
            <textarea id="curriculo" th:field="*{curriculo}" rows="5"></textarea>
            <div th:errors="*{curriculo}" class="error-message"></div>

            <button type="submit">Cadastrar</button>
        </form>
    </section>
</main>
</body>
</html>
