<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Candidato</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <nav>
        <a th:if="${session.empresaId == null and session.admin != true and session.candidatoId == null}" th:href="@{/login}">Login Empresarial</a>
        <a th:if="${session.candidatoId == null}" th:href="@{/candidato/login}">Login Candidato</a>
        <a th:if="${session.candidatoId == null}" th:href="@{/candidato/register}">Cadastro Candidato</a>
        <a th:if="${session.empresaId != null}" th:href="@{/empresa/vagas}">Painel da Empresa</a>
        <a th:if="${session.admin == true}" th:href="@{/admin/empresas}">Painel da Administração</a>
        <a th:if="${session.empresaId != null or session.admin == true or session.candidatoId != null}" th:href="@{/logout}">Sair</a>
    </nav>
</header>
<main>
    <section class="card">
        <h1>Login do Candidato</h1>
        <form th:action="@{/candidato/login}" method="post" autocomplete="on">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required autofocus>

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" required>

            <button type="submit">Entrar</button>
        </form>
        <div th:if="${error}" class="error-message" th:text="${error}"></div>
        <p>Não possui cadastro? <a th:href="@{/candidato/register}">Faça seu cadastro</a></p>
    </section>
</main>
</body>
</html>
