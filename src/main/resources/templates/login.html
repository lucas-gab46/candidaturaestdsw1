<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Login Empresarial</title>
</head>
<body>
<div class="login-container">
    <h1>Login Empresarial</h1>
    <p class="subtitle">Acesse o painel corporativo para gerenciar vagas e profissionais.</p>
    <form th:action="@{/login}" method="post" autocomplete="off">
        <div class="form-action">
            <label for="username">Usuário:</label>
            <input type="text" id="username" name="username" required autofocus>
            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-submit">
            <button type="submit">Entrar</button>
        </div>

        <div class="form-request">
            <p>Use seu e-mail Empresarial para acessar.</p>
            <button type="button" onclick="window.location.href='#'">Recuperar senha</button>
        </div>

        <div th:if="${error}" class="error-message" th:text="${error}"></div>
    </form>
</div>
</body>
</html>
