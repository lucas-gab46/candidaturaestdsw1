spring.application.name=candidatura-estagio-t5

# Banco H2 em memória para facilitar a correção da atividade.
spring.datasource.url=jdbc:h2:mem:candidaturadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.messages.basename=messages

# E-mail de notificações. Use app.mail.enabled=true quando um SMTP estiver configurado.
app.mail.enabled=true
app.mail.from=no-reply@estagios.local
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-stacktrace=always
